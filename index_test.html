


<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お知らせ一覧</title>
  <style>
    /* ニュース全体の枠組み */
    .news-container {
      max-width: 600px;
      margin: 20px auto;
      font-family: sans-serif;
    }
    /* ニュース1件ごとのスタイル */
    .news-item {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }
    /* 日付とタイトルの並び */
    .news-header {
      display: flex;
      gap: 15px;
      margin-bottom: 5px;
    }
    .news-date {
      color: #666;
      font-weight: bold;
      font-size: 0.9em;
    }
    .news-title {
      font-weight: bold;
      color: #333;
    }
    /* 本文のスタイル */
    .news-content {
      color: #555;
      font-size: 0.95em;
      line-height: 1.5;
      white-space: pre-wrap; /* スプレッドシート内の改行を反映 */
    }
    /* ローディング表示 */
    #loading {
      text-align: center;
      color: #999;
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="news-container">
  <h2>最新のお知らせ</h2>
  
  <!-- ここにニュースが読み込まれます -->
  <div id="news-list">
    <div id="loading">お知らせを読み込み中...</div>
  </div>
</div>

<script>
  // 先ほどコピーしたGASのウェブアプリURLに書き換えてください
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwomR9K5BoWOrjMocUiA7-kvUyf9GE-QKU9OD2zf20_p55Vm2f6RiNWwBS_VOJRBHMd0g/exec';

  fetch(WEB_APP_URL)
    .then(response => response.json())
    .then(data => {
      const newsListContainer = document.getElementById('news-list');
      newsListContainer.innerHTML = ''; // ローディング表示を消去

      if (data.length === 0) {
        newsListContainer.innerHTML = '<p>現在お知らせはありません。</p>';
        return;
      }

      // データをHTMLに変換して追加
      data.forEach(item => {
        const itemHtml = `
          <div class="news-item">
            <div class="news-header">
              <span class="news-date">${item.date}</span>
              <span class="news-title">${item.title}</span>
            </div>
            <div class="news-content">${item.content}</div>
          </div>
        `;
        newsListContainer.insertAdjacentHTML('beforeend', itemHtml);
      });
    })
    .catch(error => {
      console.error('エラーが発生しました:', error);
      document.getElementById('news-list').innerHTML = '<p>お知らせの読み込みに失敗しました。</p>';
    });
</script>

</body>
</html>
